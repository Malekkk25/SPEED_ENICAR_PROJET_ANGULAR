<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed()">

    <!-- Header -->
    <div class="sidebar-header">
      <div class="logo-wrap" *ngIf="!sidebarCollapsed()">
        <div class="eni-logo-container">
          <div class="eni-logo-box">
            <span class="eni-logo-en">EN</span>
            <div class="eni-logo-divider"></div>
            <div class="eni-logo-text">
              <span class="eni-logo-carthage">ICarthage</span>
              <span class="eni-logo-school">École Nationale d'Ingénieurs</span>
            </div>
          </div>
          <span class="eni-logo-speed">SPEED</span>
        </div>
      </div>
      <button class="collapse-btn" (click)="sidebarCollapsed.set(!sidebarCollapsed())">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- User card -->
    <div class="user-card">
      <div class="avatar" [class.avatar-sm]="sidebarCollapsed()">
        {{ initials() }}
      </div>
      <div class="user-info" *ngIf="!sidebarCollapsed()">
        <p class="user-name">{{ fullName() }}</p>
        <p class="user-email">Étudiant</p>
      </div>
    </div>

    <!-- Navigation -->
<nav class="nav">
  <span class="nav-section" *ngIf="!sidebarCollapsed()">Navigation</span>
  <ng-container *ngFor="let item of navItems">
    <a
      [routerLink]="item.path"
      routerLinkActive="active"
      class="nav-item">
      <span class="nav-icon" [innerHTML]="item.icon"></span>
      <span class="nav-label" *ngIf="!sidebarCollapsed()">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && !sidebarCollapsed()">
        {{ item.badge }}
      </span>
    </a>
  </ng-container>
</nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span *ngIf="!sidebarCollapsed()">Déconnexion</span>
      </button>
    </div>

  </aside>

  <!-- Main content -->
  <main class="main">
    <router-outlet/>
  </main>

</div>
