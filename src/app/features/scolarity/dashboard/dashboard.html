<div class="dashboard-container">
  <header class="header">
    <div class="header-left">
      <div class="logo">S</div>
      <div>
        <h1>SPEED - Espace Scolarite</h1>
        <p>Bonjour, {{ user()?.firstName }} {{ user()?.lastName }}</p>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">Deconnexion</button>
  </header>

  <div class="menu-grid">
    <div class="menu-card blue" (click)="goTo('students')">
      <div class="card-number">{{ totalStudents() }}</div>
      <div class="card-label">Dossiers etudiants</div>
    </div>
    <div class="menu-card orange" (click)="goTo('documents')">
      <div class="card-number">{{ pendingDocuments() }}</div>
      <div class="card-label">Documents en attente</div>
    </div>
    <div class="menu-card red" (click)="goTo('absences')">
      <div class="card-number">{{ prolongedAbsences() }}</div>
      <div class="card-label">Absences prolongees</div>
    </div>
    <div class="menu-card purple" (click)="goTo('analysis')">
      <div class="card-number">{{ atRiskStudents() }}</div>
      <div class="card-label">Etudiants a risque (IA)</div>
    </div>
  </div>
</div>
