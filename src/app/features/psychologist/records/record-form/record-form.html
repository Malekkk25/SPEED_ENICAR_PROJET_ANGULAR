<div class="page">
  <div class="breadcrumb">
    <a routerLink="/psychologist/records">Fiches</a>
    <span>/</span>
    <span>Nouvelle fiche</span>
  </div>

  <div class="form-card">
    <div class="form-header">
      <div>
        <h1>Nouvelle fiche de suivi</h1>
        <p class="subtitle">Document confidentiel</p>
      </div>
    </div>

    <div class="error-box" *ngIf="error()">{{ error() }}</div>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="section">
        <h2 class="section-title">Identification</h2>
        <div class="form-row">
          <div class="form-group">
            <label>ID Etudiant (StudentProfile) *</label>
            <input type="number" [(ngModel)]="form.studentId" name="studentId" required placeholder="Ex: 1" class="input" />
          </div>
          <div class="form-group">
            <label>Date de seance *</label>
            <input type="date" [(ngModel)]="form.sessionDate" name="sessionDate" required class="input" />
          </div>
          <div class="form-group">
            <label>Duree (min)</label>
            <input type="number" [(ngModel)]="form.sessionDurationMinutes" name="duration" class="input" placeholder="45" />
          </div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Contenu de la seance</h2>
        <div class="form-group full">
          <label>Observations cliniques *</label>
          <textarea [(ngModel)]="form.observations" name="observations" required rows="5" class="textarea" placeholder="Comportement, affect, cognitions observes lors de la seance..."></textarea>
        </div>
        <div class="form-group full">
          <label>Interventions realisees</label>
          <textarea [(ngModel)]="form.interventions" name="interventions" rows="4" class="textarea" placeholder="Techniques utilisees, exercices proposes..."></textarea>
        </div>
        <div class="form-group full">
          <label>Recommandations</label>
          <textarea [(ngModel)]="form.recommendations" name="recommendations" rows="3" class="textarea" placeholder="Objectifs, actions planifiees, ressources..."></textarea>
        </div>
        <div class="form-group full">
          <label>Progression de l'etudiant</label>
          <input type="text" [(ngModel)]="form.studentProgress" name="studentProgress" class="input" placeholder="Premiere consultation / Amelioration / Stable..." />
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Evaluation du risque</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Niveau de risque *</label>
            <select [(ngModel)]="form.riskLevel" name="riskLevel" required class="input">
              <option value="LOW">Faible</option>
              <option value="MODERATE">Modere</option>
              <option value="HIGH">Eleve</option>
              <option value="CRITICAL">Critique</option>
            </select>
          </div>
          <div class="form-group">
            <label>Suivi requis</label>
            <select [(ngModel)]="form.followUpRequired" name="followUpRequired" class="input">
              <option [ngValue]="false">Non</option>
              <option [ngValue]="true">Oui</option>
            </select>
          </div>
          <div class="form-group" *ngIf="form.followUpRequired">
            <label>Date de suivi</label>
            <input type="date" [(ngModel)]="form.nextSessionDate" name="nextSessionDate" class="input" />
          </div>
        </div>
      </div>

      <div class="risk-warning" *ngIf="form.riskLevel === 'CRITICAL' || form.riskLevel === 'HIGH'">
        Niveau de risque eleve — Une alerte sera generee automatiquement.
      </div>

      <div class="form-actions">
        <a routerLink="/psychologist/records" class="btn-cancel">Annuler</a>
        <button type="submit" class="btn-submit" [disabled]="f.invalid || saving()">
          {{ saving() ? 'Enregistrement...' : 'Creer la fiche' }}
        </button>
      </div>
    </form>
  </div>
</div>
